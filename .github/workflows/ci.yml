name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "fastapi>=0.115,<1"
          python -c "import fastapi; print('fastapi_ok', fastapi.__version__)"

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile api_app.py
          python -m py_compile config.py
          python -m py_compile react_agent.py
          python -m py_compile factory.py
          python -m py_compile vector_store.py
          python -m py_compile agent_tool.py
          python -m py_compile rag_service.py

      - name: Import smoke test
        env:
          OPENAI_API_KEY: "ci_dummy_key"
          OPENAI_BASE_URL: "https://api.openai.com/v1"
          APP_API_KEY: "ci_dummy_app_key"
        run: |
          python -c "import config; print('config_import_ok')"
          python -c "import factory; print('factory_import_ok')"
          python -c "import api_app; print('api_app_import_ok')"

      - name: FastAPI route smoke test
        env:
          OPENAI_API_KEY: "ci_dummy_key"
          OPENAI_BASE_URL: "https://api.openai.com/v1"
          APP_API_KEY: "ci_dummy_app_key"
        run: |
          python - << 'PY'
          import os
          from fastapi.testclient import TestClient
          from api_app import app

          print("APP_API_KEY:", repr(os.getenv("APP_API_KEY")))
          client = TestClient(app)

          r = client.get("/v1/health")
          print("health:", r.status_code, r.json())

          r2 = client.post("/v1/chat", json={"query": "test", "chat_history": []})
          print("chat_without_key:", r2.status_code, r2.text)

          assert r2.status_code in (400, 401), f"unexpected status={r2.status_code}, body={r2.text}"
          body2 = r2.json()
          assert body2.get("code") == 1002, f"unexpected body={body2}"

          print("route_smoke_test_ok")
          PY
          

      - name: Debug requirements content
        run: |
          python - << 'PY'
          from pathlib import Path
          p = Path("requirements.txt")
          print("exists:", p.exists(), "size:", p.stat().st_size if p.exists() else -1)
          for i, line in enumerate(p.read_text(encoding="utf-8", errors="replace").splitlines(), 1):
              print(i, repr(line))
          PY